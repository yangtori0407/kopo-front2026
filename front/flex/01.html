<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: red;
            width: 700px;
            height: 500px;
            /* gap: 10px; */
            display: flex; /* 기본적으로 flex-direction: row */
            flex-direction: row;
            justify-content: space-around;
        }
        .item{
            background-color: beige;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>
</body>
</html>
