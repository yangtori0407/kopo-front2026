<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function getLotto(){
            //랜덤
            let arr = [];
            let count = 0;

            while(true){
                //let num = Math.floor((Math.random() * 45 ) + 1)  //Math.random() * 큰수를 곱해서 % 45 + 1;
                let num = Math.floor(Math.random() * 329403830 % 45)  + 1
                //console.log(num);
                if(!arr.includes(num)){
                    arr.push(num);
                    count++;
                }

                if(count === 6) break;
            }
            

            document.getElementById("lottoNumber").innerText = arr;
        }
    </script>
</head>
<body>
    <h2 id = "lottoNumber"></h2>
    <input onclick="getLotto()" type="button" value="로또번호">
</body>
</html>
